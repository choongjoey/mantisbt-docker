name: Sync fork with upstream

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPOSITORY: ${{ vars.UPSTREAM_REPOSITORY || 'okainov/mantisbt-docker' }}

    steps:
      - name: Mirror default branch and tags from upstream
        run: |
          set -euo pipefail

          git clone "https://github.com/${UPSTREAM_REPOSITORY}.git" upstream
          cd upstream

          default_branch="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [ -z "${default_branch}" ]; then
            echo "Could not detect upstream default branch"
            exit 1
          fi

          target_repo="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          git push --force "${target_repo}" "refs/heads/${default_branch}:refs/heads/${default_branch}"
          git push --force --tags "${target_repo}"
